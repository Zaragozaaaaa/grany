<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Грань</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <main class="app">
    <header class="app__header">
      <h1>Грань</h1>
      <p class="app__subtitle">Расскажи ситуацию — увидь, что она говорит о тебе</p>
    </header>

    <section class="entry-form">
      <label for="situation">Что произошло?</label>
      <textarea id="situation" placeholder="Опиши ситуацию..." rows="3"></textarea>

      <label for="reaction">Как ты отреагировал(а)?</label>
      <textarea id="reaction" placeholder="Что ты почувствовал(а), сделал(а), подумал(а)..." rows="3"></textarea>

      <button id="submit-btn" type="button">Показать зеркало</button>
    </section>

    <section id="result" class="result" hidden>
      <h2>Зеркало</h2>
      <p id="result-text"></p>
    </section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
